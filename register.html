<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Nura AI Labs</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">
        Nura AI Labs
      </a>
    </div>
  </nav>

  <!-- Register Card -->
  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-7 col-md-9">

        <div class="card shadow border-0">

          <div class="card-body p-5">

            <h2 class="text-center fw-bold mb-2">
              Create Your Account
            </h2>

            <p class="text-center text-muted mb-4">
              It takes less than a minute.
            </p>

            <!-- AJAX Message -->
            <div id="formMsg" class="alert d-none"></div>

            <form id="registerForm">

              <div class="mb-3">
                <label for="username" class="form-label">
                  Username
                </label>

                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">
                  Email
                </label>

                <input type="email" id="email" class="form-control" placeholder="Enter email" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">
                  Password
                </label>

                <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters"
                  minlength="6" required>
              </div>

              <div class="mb-3">
                <label for="name" class="form-label">
                  Full Name
                </label>

                <input type="text" id="name" class="form-control" placeholder="Enter your full name">
              </div>

              <div class="row">

                <div class="col-md-4 mb-3">

                  <label for="age" class="form-label">
                    Age
                  </label>

                  <input type="number" id="age" class="form-control" min="1">

                </div>

                <div class="col-md-8 mb-3">

                  <label for="interests" class="form-label">
                    Interests
                  </label>

                  <input type="text" id="interests" class="form-control" placeholder="Design, Hiking, Chess">

                </div>

              </div>

              <div class="mb-4">

                <label for="bio" class="form-label">
                  Bio
                </label>

                <textarea id="bio" rows="3" class="form-control"
                  placeholder="Tell us something about yourself"></textarea>

              </div>

              <button type="submit" id="submitBtn" class="btn btn-primary w-100">

                Create Account

              </button>

            </form>

            <hr class="my-4">

            <p class="text-center mb-0">

              Already have an account?

              <a href="login.html" class="text-decoration-none fw-semibold">

                Sign In

              </a>

            </p>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Register Script -->
  <script src="js/register.js"></script>

</body>

</html>
