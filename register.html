<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Nura AI Labs</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">Nura AI Labs</div>
</div>

<div class="shell">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Takes less than a minute.</p>

    <div class="msg" id="formMsg"></div>

    <form id="registerForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6">
      </div>
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name">
      </div>
      <div class="field-row">
        <div class="field" style="flex:1">
          <label for="age">Age</label>
          <input type="number" id="age" min="1">
        </div>
        <div class="field" style="flex:2">
          <label for="interests">Interests</label>
          <input type="text" id="interests" placeholder="design, hiking, chess">
        </div>
      </div>
      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" rows="3"></textarea>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Create account</button>
    </form>

    <div class="foot-link">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/register.js"></script>
</body>
</html>
