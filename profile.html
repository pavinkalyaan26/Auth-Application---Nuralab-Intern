<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile — Nura AI Labs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html">
                Nura AI Labs
            </a>
        </div>
    </nav>

    <!-- Profile -->
    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <!-- Profile Card -->
                <div class="card shadow border-0" id="profileCard" style="display:none;">

                    <div class="card-body p-5">

                        <div class="d-flex align-items-center mb-4">

                            <div id="avatarInitial" class="avatar me-4">

                                ?

                            </div>

                            <div>

                                <h2 id="displayName" class="fw-bold mb-1">

                                    —

                                </h2>

                                <p id="displayUsername" class="text-muted mb-0">

                                    —

                                </p>

                            </div>

                        </div>

                        <ul class="list-group list-group-flush">

                            <li class="list-group-item d-flex justify-content-between">
                                <strong>Email</strong>
                                <span id="fEmail">—</span>
                            </li>

                            <li class="list-group-item d-flex justify-content-between">
                                <strong>Age</strong>
                                <span id="fAge">—</span>
                            </li>

                            <li class="list-group-item d-flex justify-content-between">
                                <strong>Bio</strong>
                                <span id="fBio">—</span>
                            </li>

                            <li class="list-group-item">

                                <strong>Interests</strong>

                                <div id="fInterests" class="mt-2">

                                    —

                                </div>

                            </li>

                            <li class="list-group-item d-flex justify-content-between">
                                <strong>Member Since</strong>
                                <span id="fSince">—</span>
                            </li>

                        </ul>

                        <button id="logoutBtn" class="btn btn-danger w-100 mt-4">

                            Sign Out

                        </button>

                    </div>

                </div>

                <!-- Loading Card -->

                <div class="card shadow border-0" id="loadingCard">

                    <div class="card-body text-center py-5">

                        <div class="spinner-border text-primary mb-3" role="status">

                            <span class="visually-hidden">
                                Loading...
                            </span>

                        </div>

                        <h5 class="mb-0">
                            Loading your profile...
                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Profile JS -->
    <script src="js/profile.js"></script>

</body>

</html>
