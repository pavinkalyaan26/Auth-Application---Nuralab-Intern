<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Profile — Nura AI Labs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
    <div class="brand">My Profile</div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="shell">

                <div class="profile-card" id="profileCard" style="display:none">

                    <div class="profile-head">
                        <div class="avatar" id="avatarInitial">?</div>

                        <div>
                            <h1 id="displayName">—</h1>
                            <p id="displayUsername">—</p>
                        </div>
                    </div>

                    <div class="detail-row">
                        <span>Email</span>
                        <span id="fEmail">—</span>
                    </div>

                    <div class="detail-row">
                        <span>Age</span>
                        <span id="fAge">—</span>
                    </div>

                    <div class="detail-row">
                        <span>Bio</span>
                        <span id="fBio">—</span>
                    </div>

                    <div class="detail-row">
                        <span>Interests</span>
                        <span id="fInterests">—</span>
                    </div>

                    <div class="detail-row">
                        <span>Member since</span>
                        <span id="fSince">—</span>
                    </div>

                    <button class="btn-secondary logout-btn w-100 mt-3" id="logoutBtn">
                        Sign out
                    </button>

                </div>

                <div class="auth-card" id="loadingCard">
                    <p class="sub m-0">
                        Loading your profile...
                    </p>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/profile.js"></script>

</body>
</html>
