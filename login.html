<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Nura AI Labs</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">Nura AI Labs</div>
</div>

<div class="shell">
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="sub">Welcome back.</p>

    <div class="msg" id="formMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="identifier">Username or email</label>
        <input type="text" id="identifier" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
    </form>

    <div class="foot-link">New here? <a href="register.html">Create an account</a></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
