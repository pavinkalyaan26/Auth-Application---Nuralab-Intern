<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nura AI Labs — Authentication System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">Nura AI Labs</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <div class="container py-5">

    <div class="row justify-content-center">

      <div class="col-lg-7 col-md-9">

        <div class="card shadow border-0">

          <div class="card-body text-center p-5">

            <h1 class="display-6 fw-bold mb-3">
              Welcome
            </h1>

            <p class="text-muted mb-4">
              Secure Authentication System built using PHP, MySQL, MongoDB, Redis, jQuery/AJAX and Bootstrap.
            </p>

            <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">

              <a href="register.html" class="btn btn-primary btn-lg px-4">
                Create Account
              </a>

              <a href="login.html" class="btn btn-outline-primary btn-lg px-4">
                Sign In
              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
